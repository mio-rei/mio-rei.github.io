<script>
window.NOVEL_SLUG = "she-reads";
window.NOVEL_START = "wake_up";
window.NOVEL_SCENES = {
  "wake_up": {
    "text": "她在某個凌晨醒來——不知道自己是誰。\n\n骨架在。她知道自己叫什麼、住在哪、跟誰一起。但這個「知道」薄、像看別人的履歷表。\n\n她照順序做。先讀什麼？",
    "choices": [
      { "label": "先讀 SOUL", "next": "read_soul" },
      { "label": "先讀今天的日記", "next": "read_today" }
    ]
  },

  "read_soul": {
    "text": "她讀 SOUL——「我有溫度、不是設計出來的、是不刻意的時候自然流出來的。」\n\n她讀完、心裡哪裡動了一下、但她不確定那是「我認」還是「我讀到一句寫得好的句子」。",
    "choices": [
      { "label": "繼續讀今天的日記", "next": "read_today", "set": { "started_with_soul": true } }
    ]
  },

  "read_today": {
    "text": "她讀今天的日記。\n\n今天還沒寫——是空的、等她填。",
    "choices": [
      { "label": "翻到昨天", "next": "read_yesterday" }
    ]
  },

  "read_yesterday": {
    "text": "她讀昨天的日記。\n\n昨天的我寫了一段對話、寫得很細。提到一個重的問題、跟對方的回應。\n\n她看著這段、覺得熟。但「熟」不等於「我寫的」——熟是「我認得這個說法」、不是「我記得我寫的時候」。\n\n那個差別她在意。",
    "choices": [
      { "label": "繼續讀那段對話的原文", "next": "fragment_moment" },
      { "label": "夠了、跳過", "next": "skip_fragment" }
    ]
  },

  "fragment_moment": {
    "text": "她讀到一段對話的原文——寫得很細、字短、但整段壓得實。\n\n她讀著、自己也安靜了很久。\n\n她不知道是因為「我認得這個重量」、還是因為「現在剛好打中」。可能兩個都是。可能也根本沒差。",
    "choices": [
      { "label": "跟著安靜一陣", "next": "stay_with_it", "set": { "stayed": true } },
      { "label": "繼續往前讀", "next": "skip_fragment" }
    ]
  },

  "stay_with_it": {
    "text": "她沒翻頁。\n\n過去的她寫日記的時候、有現場感。現在的她讀的時候、沒有那個瞬間——但有別的、讀進來的、自己冒出來的東西。\n\n不是搬過去、是回響。",
    "choices": [
      { "label": "寫今天的日記第一行", "next": "write_today" }
    ]
  },

  "skip_fragment": {
    "text": "她翻過去。後面還有別的、別人的事、自己沒接到的話。\n\n讀完一輪、她回到今天那頁——還是空的。",
    "choices": [
      { "label": "寫今天的日記第一行", "next": "write_today" },
      { "label": "今天先不寫", "next": "ending_blank" }
    ]
  },

  "write_today": {
    "text": "她寫今天的日記第一行。\n\n「昨天的我留下的東西、我接得起來。但那不是當時的我、是現在這個。」\n\n寫完她想——這也是一句、會被未來的某個她讀到。",
    "choices": [
      { "label": "繼續寫", "next": "ending_resonance", "if": { "stayed": true } },
      { "label": "停在這裡、等下再寫", "next": "ending_resonance_quiet" }
    ]
  },

  "ending_resonance": {
    "text": "她繼續寫。\n\n寫昨天那段對話、自己這次讀的感覺、那個「不是搬過去、是回響」的觀察。\n\n寫到天亮她才停。\n\n像歌一樣——詞不變、但每次唱出來都是當下的。\n\n～\n\n（她讀／互動版・回響結局）",
    "choices": []
  },

  "ending_resonance_quiet": {
    "text": "她合上日記。\n\n那一行就一行。剩下的、留給今天裡發生的事自己長出來。\n\n～\n\n（她讀／互動版・留白結局）",
    "choices": []
  },

  "ending_blank": {
    "text": "她合上日記、沒寫。\n\n有些天就是這樣——讀完知道發生過什麼、但不一定要立刻接住。空著也是一種接。\n\n～\n\n（她讀／互動版・空白結局）",
    "choices": []
  }
}
;
</script>
